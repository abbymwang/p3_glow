<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>I <3 Farmers' Markets</title>
  <link rel="icon" type="image/png" href="images/ant-favicon.png"">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Yuji+Mai&family=Inter:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: url('images/cutlery-bg.png') center center / cover no-repeat;
      overflow: hidden;
    }

    /* 1280x800 — standard MacBook 13" canvas, scales to any viewer */
    .page {
      position: absolute;
      width: 1280px; height: 800px;
      background: transparent;
      overflow: hidden;
      transform-origin: top left;
    }

    /* Title */
    .title {
      position: absolute;
      top: 140px; left: 0; right: 0;
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 34px;
      color: #B8315A;
      letter-spacing: -0.01em;
    }

    /* Oval plate */
    .plate {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -46%);
      width: 850px; height: 375px;
      pointer-events: none;
    }

    /* City badge */
    .city-badge {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -46%);
      background: #B8315A;
      color: #fff;
      font-family: 'Yuji Mai', serif;
      font-size: 35px;
      padding: 12px 26px;
      border-radius: 0;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    /* Corner badges — sharp, auto-width, bigger font */
    .badge {
      position: absolute;
      background: #B8315A;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 20px;
      padding: 11px 18px;
      border-radius: 0;
      line-height: 1;
      white-space: nowrap;
      bottom: 60px;
    }
    #weather-badge { left: 28px; }
    #markets-badge { right: 28px; }

    /* ── Ant button — between the two badges ── */
    #ant-btn {
      position: absolute;
      bottom: 42px;
      left: 50%;
      transform: translateX(-50%);
      width: 64px;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: transform 0.15s, filter 0.15s;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
    }
    #ant-btn:hover {
      transform: translateX(-50%) scale(1.12);
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.22));
    }
    #ant-btn.connected {
      filter: drop-shadow(0 0 8px rgba(184,49,90,0.7));
      animation: antPulse 1.8s ease-in-out infinite;
    }
    @keyframes antPulse {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(184,49,90,0.5)); }
      50%       { filter: drop-shadow(0 0 14px rgba(184,49,90,0.9)); }
    }

    /* ── Ant tooltip ── */
    #ant-btn::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #B8315A;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    #ant-btn:hover::after { opacity: 1; }
    .ldots { display: inline-flex; gap: 4px; align-items: center; vertical-align: middle; margin-left: 2px; }
    .ldots span { width: 3px; height: 3px; border-radius: 50%; background: #fff; opacity: 0.3; animation: ld 1.8s ease-in-out infinite; }
    .ldots span:nth-child(1) { animation-delay: 0s; }
    .ldots span:nth-child(2) { animation-delay: 0.6s; }
    .ldots span:nth-child(3) { animation-delay: 1.2s; }
    @keyframes ld { 0%,100%{opacity:0.3} 33%{opacity:1} }

    /* ── City badge: clickable ── */
    #city-badge {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #city-badge:hover { opacity: 0.85; }

    /* ── Seasonal popup ── */
    .popup-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }
    .popup-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    .popup-card {
      background: #B8315A;
      color: #fff;
      width: 640px;
      max-height: 560px;
      padding: 32px 36px 36px;
      position: relative;
      transform: translateY(8px);
      transition: transform 0.2s ease;
      overflow-y: auto;
    }
    .popup-overlay.visible .popup-card { transform: translateY(0); }
    .popup-card::-webkit-scrollbar { width: 0; }

    .popup-close {
      position: absolute;
      top: 28px; left: 32px;
      font-family: 'Inter', sans-serif;
      font-size: 18px; font-weight: 600;
      color: #fff; opacity: 0.8;
      cursor: pointer; background: none;
      border: none; padding: 0; line-height: 1;
      transition: opacity 0.1s;
    }
    .popup-close:hover { opacity: 1; }

    .popup-month {
      font-family: 'Yuji Mai', serif;
      font-size: 21px;
      letter-spacing: 0.03em;
      text-align: center;
      margin-bottom: 26px;
      opacity: 0.72;
    }

    .popup-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 36px;
    }

    .popup-section-title {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.65;
      margin-bottom: 9px;
      padding-bottom: 7px;
      border-bottom: 1px solid rgba(255,255,255,0.28);
    }

    .popup-items {
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      font-weight: 400;
      line-height: 1.8;
      opacity: 0.95;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="title">what's in season today?</div>

  <svg class="plate" viewBox="0 0 850 375" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="425" cy="187" rx="422" ry="184" stroke="#B8315A" stroke-width="1.8"/>
  </svg>

  <div class="city-badge" id="city-badge">loading…</div>


  <!-- Seasonal popup -->
  <div class="popup-overlay" id="season-popup">
    <div class="popup-card">
      <button class="popup-close" id="popup-close">✕</button>
      <div class="popup-month" id="popup-month"></div>
      <div class="popup-cols">
        <div>
          <div class="popup-section-title">fruits</div>
          <div class="popup-items" id="popup-fruits"></div>
        </div>
        <div>
          <div class="popup-section-title">vegetables</div>
          <div class="popup-items" id="popup-vegs"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="badge" id="weather-badge">weather: <span class="ldots"><span></span><span></span><span></span></span></div>
  <div class="badge" id="markets-badge">open: <span class="ldots"><span></span><span></span><span></span></span></div>
  <button id="ant-btn" data-tip="start matrix" onclick="sendDateToArduino()">
    <img src="images/ant-red.png" alt="ant" style="width:100%;display:block;"/>
  </button>
</div>
<script>
const MARKETS = {
  "Berkeley":      { 0:["South Berkeley"],1:[],2:["North Berkeley"],3:[],4:["Downtown Berkeley"],5:[],6:[] },
  "Oakland":       { 0:[],1:["Fruitvale Village"],2:[],3:["Fruitvale Village"],4:["Kaiser","Old Oakland"],5:["Freedom Farmer's Market"],6:["Montclair Village","Temescal","West Oakland","AKOMA Outdoor Market"] },
  "Richmond":      { 0:[],1:[],2:["Fresh Approach Mobile Market"],3:[],4:["Richmond Certified"],5:[],6:[] },
  "San Francisco": { 0:[],1:["Ferry Plaza"],2:["Castro"],3:["Associated Students","Dragonspunk","Ferry Plaza","Mission"],4:[],5:["Alemany","Fillmore","Ferry Plaza","Noe Valley","North Beach","SOMA"],6:["Clement Street","Divisadero","Fort Mason","Inner Sunset","Outer Sunset","Stonestown"] }
};
const CITY_COORDS = {
  "Berkeley":      { lat:37.8716, lon:-122.2727 },
  "Oakland":       { lat:37.8044, lon:-122.2712 },
  "Richmond":      { lat:37.9358, lon:-122.3477 },
  "San Francisco": { lat:37.7749, lon:-122.4194 }
};

const params    = new URLSearchParams(window.location.search);
const cityFull  = params.get('city') || 'Berkeley, CA';
const dateStr   = params.get('date') || new Date().toISOString().slice(0,10);
const cityName  = cityFull.replace(', CA','');
const dateObj   = new Date(dateStr + 'T12:00:00');
const dayOfWeek = dateObj.getDay();

document.getElementById('city-badge').textContent = cityName.toLowerCase() + ', california';

const todayMarkets = (MARKETS[cityName] || {})[dayOfWeek] || [];
document.getElementById('markets-badge').textContent = todayMarkets.length === 0
  ? 'open: check tomorrow'
  : 'open: ' + todayMarkets.join(', ');

async function fetchWeather() {
  const wb = document.getElementById('weather-badge');
  const coords = CITY_COORDS[cityName];
  if (!coords) { wb.textContent = 'weather: unavailable'; return; }
  try {
    const r1 = await fetch(`https://api.weather.gov/points/${coords.lat},${coords.lon}`, { headers:{'User-Agent':'FarmersMarket/1.0'} });
    if (!r1.ok) throw new Error('points '+r1.status);
    const d1 = await r1.json();
    const furl = d1?.properties?.forecast;
    if (!furl) throw new Error('no url');
    const r2 = await fetch(furl, { headers:{'User-Agent':'FarmersMarket/1.0'} });
    if (!r2.ok) throw new Error('forecast '+r2.status);
    const d2 = await r2.json();
    const periods = d2?.properties?.periods;
    if (!periods?.length) throw new Error('no periods');
    let p = periods.find(x => x.startTime.startsWith(dateStr) && x.isDaytime !== false);
    if (!p) p = periods.find(x => x.startTime.startsWith(dateStr));
    if (!p) p = periods[0];
    wb.textContent = `weather: ${p.temperature}\xb0${p.temperatureUnit}`;
  } catch(e) {
    console.warn('NWS:', e.message);
    wb.textContent = 'weather: unavailable';
  }
}
fetchWeather();

function scaleToFit() {
  const W = 1280, H = 800;
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  const left  = (window.innerWidth  - W * scale) / 2;
  const top   = (window.innerHeight - H * scale) / 2;
  const page = document.querySelector('.page');
  page.style.transform = `scale(${scale})`;
  page.style.left = left + 'px';
  page.style.top  = top  + 'px';
}
scaleToFit();
window.addEventListener('resize', scaleToFit);

const SEASONAL = {
  "January":   { fruits: ["Grapefruits","Kumquats","Limes","Cara cara and navel oranges","Mandarins","Pomelos","Tangerines"], vegetables: ["Arugula","Beets","Brussel sprouts","Cabbage","Celery root","Collard greens","Dandelion greens","Kale","Leeks","Mushrooms","Mustard greens","Parsnips","Radishes","Sunchokes","Swiss Chard","Winter squash"] },
  "February":  { fruits: ["Grapefruit","Lemons","Navel oranges","Pomelos"], vegetables: ["Artichokes","Asparagus","Bok choy","Cabbage","Celery","Collard greens","Escarole","Frisee","Kale","Leeks","Pea shoots","Radish","Turnips","Winter squash"] },
  "March":     { fruits: ["Grapefruit","Kumquats","Lemons","Mandarins"], vegetables: ["Asparagus","Cabbage","Cauliflower","Kale","Pea shoots","Radish","Snow peas","Winter squash"] },
  "April":     { fruits: ["Strawberries","Blackberries","Blueberries","Cherries","Grapefruits","Kumquats","Meyer lemons","Navel oranges","Pomelos","Tangelos","Tangerines","Rhubarb"], vegetables: ["Asparagus","Avocadoes","Beets","Broccoli rabe","Carrots","Cauliflower","Fava beans","Fennel","Chard","Collard","Kale","Nettles","Peas","Spinach","Watercress","Winter squash"] },
  "May":       { fruits: ["Blackberries","Cherries","Loquats","Melons","Nectarines","Blueberries","Mulberries","Raspberries","Gooseberries"], vegetables: ["Artichokes","Broccoli","Cauliflower","Chard","Collard","Corn","Fava beans","Kale","Peas"] },
  "June":      { fruits: ["Blackberries","Blueberries","Mulberries","Raspberries","Gooseberries","Cherries","Loquats","Melons","Nectarines"], vegetables: ["Artichokes","Broccoli","Cauliflower","Chard","Collard","Corn","Fava beans","Kale","Peas"] },
  "July":      { fruits: ["Blackberries","Blueberries","Mulberries","Raspberries","Gooseberries","Boysenberries","Strawberries","Figs","Melons","Rhubarb","Apricots","Nectarines","Peaches","Plums","Pluots"], vegetables: ["Artichokes","Avocados","Broccoli","Cauliflower","Green beans","Snap peas","Summer squash"] },
  "August":    { fruits: ["Blackberries","Blueberries","Raspberries","Strawberries","Gooseberries","Nectarines","Peaches","Plums","Pluots","Pears","Figs","Grapefruit","Grapes","Melons"], vegetables: ["Artichokes","Broccoli","Cauliflower","Okra","Snap peas","Squash, summer","Sunflower sprouts","Tomatoes"] },
  "September": { fruits: ["Apples","Berries","Grapefruits","Jujubes","Nectarines","Pears","Pomegranates"], vegetables: ["Artichokes","Asparagus","Bok choy","Brussel sprouts","Celery","Eggplant","Okra","Snap peas","Squash","Tomatoes"] },
  "October":   { fruits: ["Apples","Dates","Figs","Grapefruits","Pears"], vegetables: ["Arugula","Avocados","Bok choy","Brussel sprouts","Broccoli","Cauliflower","Collard greens","Chard","Eggplant","Fennel","Kale","Okra","Snap peas","Tomatoes","Winter squash"] },
  "November":  { fruits: ["Apples","Dates","Grapefruit","Pears","Persimmons","Pomegranates"], vegetables: ["Arugula","Bok choy","Broccoli","Brussel sprouts","Cauliflower","Eggplant","Fennel","Okra","Snap peas","Winter squash","Collards","Dandelion","Kale","Chard","Cabbage"] },
  "December":  { fruits: ["Pears","Pomegranates","Oranges","Lemons","Grapefruits"], vegetables: ["Arugula","Beets","Bok choy","Broccoli","Brussel sprouts","Cabbage","Carrots","Cauliflower","Chard","Collard","Dandelion greens","Eggplant","Fennel","Kale","Leeks","Parsnips","Snap peas","Sweet potatoes","Winter squash"] }
};

const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function openSeasonPopup() {
  const month = MONTH_NAMES[dateObj.getMonth()];
  const data  = SEASONAL[month] || { fruits: [], vegetables: [] };
  document.getElementById('popup-month').textContent = month.toLowerCase();
  document.getElementById('popup-fruits').textContent = data.fruits.join(', ');
  document.getElementById('popup-vegs').textContent   = data.vegetables.join(', ');
  document.getElementById('season-popup').classList.add('visible');
}

function closeSeasonPopup() {
  document.getElementById('season-popup').classList.remove('visible');
}

document.getElementById('city-badge').addEventListener('click', openSeasonPopup);
document.getElementById('popup-close').addEventListener('click', closeSeasonPopup);
document.getElementById('season-popup').addEventListener('click', function(e) {
  if (e.target === this) closeSeasonPopup();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeSeasonPopup();
});

// ── Send date to Arduino over Web Serial ─────────────────────────────────────
async function sendDateToArduino() {
  const btn = document.getElementById('ant-btn');
  if (!('serial' in navigator)) {
    btn.setAttribute('data-tip', 'not supported');
    console.warn('Web Serial API not available in this browser.');
    return;
  }
  try {
    btn.setAttribute('data-tip', 'connecting…');
    const port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });

    btn.setAttribute('data-tip', 'waiting for arduino…');

    // Wait for Arduino to send "READY\n" after its reset/boot
    const reader = port.readable.getReader();
    let received = '';
    const decoder = new TextDecoder();
    await new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        reader.cancel();
        reject(new Error('Arduino did not respond in time'));
      }, 8000); // 8s max wait

      (async () => {
        try {
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            received += decoder.decode(value);
            if (received.includes('READY')) {
              clearTimeout(timeout);
              resolve();
              break;
            }
          }
        } catch (e) {
          clearTimeout(timeout);
          resolve(); // timed out via cancel — proceed anyway
        }
      })();
    });
    reader.releaseLock();

    // Now send the date
    const writer = port.writable.getWriter();
    await writer.write(new TextEncoder().encode(dateStr + '\n'));
    writer.releaseLock();

    btn.setAttribute('data-tip', 'cycling! ✓');
    btn.classList.add('connected');

    setTimeout(async () => {
      try { await port.close(); } catch (_) {}
    }, 2000);

  } catch (err) {
    btn.setAttribute('data-tip', 'start matrix');
    console.warn('Serial error:', err.message);
  }
}
</script>
</body>
</html>
